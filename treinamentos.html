<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treinamentos — GETREC/title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<link href="css/variables.css" rel="stylesheet">
<link href="css/treinamentos.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-logo">
      <div class="brand-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0E1117" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <div class="brand-name">GETREC</div>
    </div>
    <div class="brand-sub">GESTÃO DE TREINAMENTOS</div>
    <div class="db-pill">
      <div class="db-dot" id="db-dot"></div>
      <span id="db-label">Conectando...</span>
    </div>
  </div>
  <nav class="nav">
    <div class="nav-section">Principal</div>
    <button class="nav-item" onclick="location.href='dashboard-adm.html'">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </button>
    <button class="nav-item active">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
      Treinamentos
      <span class="nav-badge" id="nav-count">—</span>
    </button>
    <button class="nav-item" onclick="location.href='colaboradores.html'">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      Colaboradores
    </button>
    <button class="nav-item" onclick="location.href='colaboradores.html'">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      Matrículas
    </button>
    <button class="nav-item" onclick="location.href='presencas.html'">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Presenças
    </button>
    <div class="nav-section">Emissões</div>
    <button class="nav-item" onclick="location.href='certificados.html'">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>
      Certificados
    </button>
  </nav>
  <div class="sidebar-footer">
    <div class="user-card">
      <div class="user-avatar">AD</div>
      <div>
        <div class="user-name">Administrador</div>
        <div class="user-role">Gestor Geral · GETREC</div>
      </div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <h1>Treinamentos</h1>
      <p id="topbar-sub">Carregando...</p>
    </div>
    <div class="topbar-right">
      <button class="btn-primary" onclick="openModal()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Novo Treinamento
      </button>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="search" type="text" placeholder="Buscar por nome, área ou instrutor..." oninput="renderTable()">
    </div>
    <select class="filter-select" id="filter-status" onchange="renderTable()">
      <option value="">Todos os status</option>
      <option value="ativo">Ativo</option>
      <option value="andamento">Em andamento</option>
      <option value="encerrado">Encerrado</option>
    </select>
    <select class="filter-select" id="filter-area" onchange="renderTable()">
      <option value="">Todas as áreas</option>
    </select>
    <select class="filter-select" id="sort-by" onchange="renderTable()">
      <option value="recent">Mais recentes</option>
      <option value="nome">Nome A–Z</option>
      <option value="area">Área</option>
      <option value="carga">Carga horária</option>
    </select>
    <div class="toolbar-sep"></div>
    <span class="count-label" id="count-label">— treinamentos</span>
  </div>

  <div class="content">
    <!-- KPIs mini -->
    <div class="kpi-mini">
      <div class="kpi-m">
        <div class="kpi-m-icon" style="background:var(--accent-dim)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#F5A623" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
        </div>
        <div><div class="kpi-m-val" id="km-total">—</div><div class="kpi-m-label">Total</div></div>
      </div>
      <div class="kpi-m">
        <div class="kpi-m-icon" style="background:var(--green-dim)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2ECC71" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div><div class="kpi-m-val" id="km-ativos">—</div><div class="kpi-m-label">Ativos</div></div>
      </div>
      <div class="kpi-m">
        <div class="kpi-m-icon" style="background:var(--accent-dim)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#F5A623" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <div><div class="kpi-m-val" id="km-andamento">—</div><div class="kpi-m-label">Em andamento</div></div>
      </div>
      <div class="kpi-m">
        <div class="kpi-m-icon" style="background:var(--surface2)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-faint)" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>
        </div>
        <div><div class="kpi-m-val" id="km-encerrados">—</div><div class="kpi-m-label">Encerrados</div></div>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-panel">
      <table class="data-table">
        <thead>
          <tr>
            <th style="width:32%">Treinamento / Área</th>
            <th>Instrutor</th>
            <th class="sortable">Carga</th>
            <th>Período</th>
            <th>Status</th>
            <th style="width:80px"></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div id="empty-state" class="empty-state" style="display:none">
        <div class="empty-icon">📋</div>
        <div class="empty-title">Nenhum treinamento encontrado</div>
        <div style="font-size:13px;color:var(--text-muted);margin-top:6px">Tente outro filtro ou cadastre um novo treinamento.</div>
      </div>
    </div>
  </div>
</main>

<!-- DETAIL PANEL -->
<div class="detail-panel" id="detail-panel">
  <div class="detail-header">
    <div class="detail-title" id="detail-title">Detalhes</div>
    <button class="modal-close" onclick="closeDetail()">×</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
  <div class="detail-actions">
    <button class="btn-primary" style="flex:1" id="detail-edit-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Editar
    </button>
    <button class="btn-danger" id="detail-del-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
      Excluir
    </button>
  </div>
</div>

<!-- MODAL CADASTRO / EDIÇÃO -->
<div class="overlay" id="overlay" onclick="closeIfBg(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Novo Treinamento</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-section">Identificação</div>
      <div class="form-row col-1">
        <div class="field">
          <label>Nome do treinamento *</label>
          <input id="f-nome" type="text" placeholder="Ex: NR-10 Segurança em Instalações Elétricas">
        </div>
      </div>
      <div class="form-row col-2">
        <div class="field">
          <label>Área / Setor *</label>
          <select id="f-area">
            <option value="">— Selecionar —</option>
            <option>Segurança do Trabalho</option>
            <option>Elétrica</option>
            <option>Mecânica</option>
            <option>Qualidade</option>
            <option>Manutenção</option>
            <option>Logística</option>
            <option>Produção</option>
            <option>TI Industrial</option>
            <option>Meio Ambiente</option>
            <option>Liderança</option>
            <option>Outro</option>
          </select>
        </div>
        <div class="field">
          <label>Instrutor responsável</label>
          <input id="f-instrutor" type="text" placeholder="Nome do instrutor">
        </div>
      </div>

      <div class="form-section">Cronograma e carga</div>
      <div class="form-row col-3">
        <div class="field">
          <label>Carga horária (h)</label>
          <input id="f-carga" type="number" placeholder="40" min="1" max="999">
        </div>
        <div class="field">
          <label>Data de início</label>
          <input id="f-inicio" type="date">
        </div>
        <div class="field">
          <label>Data de término</label>
          <input id="f-fim" type="date">
        </div>
      </div>

      <div class="form-section">Status e descrição</div>
      <div class="form-row col-2">
        <div class="field">
          <label>Status *</label>
          <select id="f-status">
            <option value="ativo">Ativo</option>
            <option value="andamento">Em andamento</option>
            <option value="encerrado">Encerrado</option>
          </select>
        </div>
        <div class="field">
          <label>Vagas</label>
          <input id="f-vagas" type="number" placeholder="Ilimitado" min="1">
          <div class="field-hint">Deixe vazio para ilimitado</div>
        </div>
      </div>
      <div class="form-row col-1">
        <div class="field">
          <label>Descrição / Objetivos</label>
          <textarea id="f-descricao" placeholder="Descreva os objetivos, público-alvo, conteúdo programático, pré-requisitos..."></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <div id="modal-del-wrap"></div>
      <div class="modal-footer-right">
        <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
        <button class="btn-primary" id="btn-save" onclick="saveTreinamento()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          Salvar
        </button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/treinamentos.js"></script>
</body>
</html>
