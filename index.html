<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Livros Simplificado</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; background-color: #f4f4f9; }
        h2 { color: #333; }
        .form-group { margin-bottom: 10px; }
        input { padding: 8px; width: 100%; box-sizing: border-box; margin-top: 5px; }
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 4px; }
        .btn-save { background-color: #28a745; color: white; width: 100%; }
        .btn-edit { background-color: #ffc107; margin-right: 5px; }
        .btn-delete { background-color: #dc3545; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #eee; }
    </style>
</head>
<body>

    <h2>📚 Cadastro de Livros</h2>
    
    <div id="book-form">
        <input type="hidden" id="book-id">
        <div class="form-group">
            <input type="text" id="title" placeholder="Título do Livro" required>
        </div>
        <div class="form-group">
            <input type="text" id="author" placeholder="Autor">
        </div>
        <button class="btn-save" onclick="saveBook()">Salvar Livro</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Título</th>
                <th>Autor</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="book-list"></tbody>
    </table>

    <script>
        let books = JSON.parse(localStorage.getItem('books')) || [];

        function renderBooks() {
            const list = document.getElementById('book-list');
            list.innerHTML = '';
            books.forEach((book, index) => {
                list.innerHTML += `
                    <tr>
                        <td>${book.title}</td>
                        <td>${book.author}</td>
                        <td>
                            <button class="btn-edit" onclick="editBook(${index})">Editar</button>
                            <button class="btn-delete" onclick="deleteBook(${index})">Excluir</button>
                        </td>
                    </tr>`;
            });
            localStorage.setItem('books', JSON.stringify(books));
        }

        function saveBook() {
            const id = document.getElementById('book-id').value;
            const title = document.getElementById('title').value;
            const author = document.getElementById('author').value;

            if (!title) return alert("O título é obrigatório!");

            const bookData = { title, author };

            if (id === "") {
                books.push(bookData); // Create
            } else {
                books[id] = bookData; // Update
                document.getElementById('book-id').value = "";
            }

            clearForm();
            renderBooks();
        }

        function editBook(index) {
            document.getElementById('book-id').value = index;
            document.getElementById('title').value = books[index].title;
            document.getElementById('author').value = books[index].author;
        }

        function deleteBook(index) {
            if (confirm("Deseja excluir este livro?")) {
                books.splice(index, 1); // Delete
                renderBooks();
            }
        }

        function clearForm() {
            document.getElementById('title').value = "";
            document.getElementById('author').value = "";
        }

        // Inicializa a lista ao carregar
        renderBooks();
    </script>
</body>
</html>
